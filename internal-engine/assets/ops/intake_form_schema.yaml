version: 1
name: ENGRAM Intake Form
purpose: Capture the minimum required inputs to start a paid pilot or pre-flight audit without adding friction.
submission_rules:
  clock_starts_when: all_required_inputs_received
  incomplete_submission_action: request_missing_inputs_and_pause_clock
fields:
  - id: brand_name
    label: Brand name
    type: text
    required: true
  - id: client_name
    label: Agency or client name
    type: text
    required: true
  - id: ad_asset
    label: Ad file or public URL
    type: file_or_url
    required: true
  - id: landing_page
    label: Landing page URL
    type: url
    required: false
  - id: platform
    label: Platform
    type: select
    required: true
    options:
      - Meta
      - TikTok
      - Both
  - id: objective
    label: Campaign objective
    type: text
    required: true
  - id: current_issue
    label: Biggest current concern
    type: textarea
    required: true
  - id: deadline
    label: Decision deadline
    type: date
    required: false
  - id: extra_context
    label: Extra context
    type: textarea
    required: false
delivery_defaults:
  pilot_audit:
    turnaround: 48h
  pre_flight_audit:
    turnaround: 72h
  pre_production_screen:
    turnaround: 48h
