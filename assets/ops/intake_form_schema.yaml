version: 1
name: ENGRAM Intake Form
purpose: Capture the required inputs for a Pilot Audit, Pre-Flight Audit, or Pre-Production Screen.
submission_rules:
  clock_starts_when: all_required_inputs_received
  incomplete_submission_action: request_missing_inputs_and_pause_clock
fields:
  - id: brand_name
    label: Brand name
    type: text
    required: true
  - id: client_name
    label: Agency or client name
    type: text
    required: true
  - id: platform
    label: Platform
    type: select
    required: true
    options:
      - Meta
      - TikTok
      - Both
  - id: category
    label: Product category
    type: select
    required: true
    options:
      - Beauty
      - Skincare
      - Fashion
      - Supplements
      - Fitness
      - Other
  - id: campaign_objective
    label: Campaign objective
    type: select
    required: true
    options:
      - Cold traffic
      - Retargeting
      - UGC test
      - Creator whitelist
      - Other
  - id: target_audience
    label: Target audience
    type: textarea
    required: true
  - id: ad_asset
    label: Ad file or public URL
    type: file_or_url
    required: true
  - id: ad_length_seconds
    label: Ad length in seconds
    type: number
    required: true
  - id: variant_count
    label: Number of variants
    type: number
    required: true
  - id: performance_data
    label: Known performance data
    type: textarea
    required: false
    notes: Include hook rate, hold rate, CTR, thumbstop rate, or other launch data if available.
  - id: extra_context
    label: Additional context for the analyst
    type: textarea
    required: false
  - id: preproduction_inputs
    label: Pre-production inputs
    type: checklist
    required: false
    options:
      - Script
      - Storyboard
      - Shot list
      - Rough cut
      - Creative brief
  - id: shoot_date
    label: Shoot date
    type: date
    required: false
delivery_defaults:
  pilot_audit:
    turnaround: 48h
  pre_flight_audit:
    turnaround: 72h
  pre_production_screen:
    turnaround: 48h
